# Single experiment file — edit `train.recipe`: tfidf_lr | textcnn | charcnn
preprocess:
  train_json: train.json
  test_json: test.json
  intent_filter_shared_only: true
  val_fraction: 0.2
  split_seed: 42
  lowercase: true
  strip_whitespace: true
  collapse_multiword: true
  mask_entity_buckets:
    - city
    - airline
    - airport-code
    - airport-name
    - state
    - date
    - time
    - numeric
  tfidf_use_masking: true
  textcnn_use_masking: true
  tokenizer: word # word | char | bpe (textcnn only; charcnn uses char)
  bpe_vocab_size: 3000
  bpe_model_type: bpe
  bpe_character_coverage: 1.0
  sentencepiece_hard_vocab_limit: false
  max_len_word: 50
  max_len_char: 200
  tfidf_max_features: 8000
  tfidf_ngram_min: 1
  tfidf_ngram_max: 2
  tfidf_sublinear_tf: true
  tfidf_strip_accents: unicode
  remove_stopwords: false
  stopword_reserve: ["from", "to", "on", "in", "at", "between", "and", "or", "via", "need", "show", "list", "give"]
  embedding_type: learned # learned | glove
  glove_name: "6B"
  glove_dim: 100
  freeze_pretrained: false
  embed_dim_learned: 128
  # Token-level random deletion on train only (after split); concat noisy copy.
  random_deletion: false
  random_deletion_p: 0.14 # must be < 0.15

train:
  recipe: textcnn # tfidf_lr | textcnn | charcnn
  seed: 42
  batch_size: 64
  max_epochs: 100
  early_stopping_patience: 30
  lr: 1e-3
  weight_decay: 1e-3
  lr_scheduler_patience: 10
  lr_scheduler_factor: 0.5
  lr_scheduler_min_lr: 1e-6
  loss_type: ce # ce | focal
  class_weight_mode: inv # inv | dampened_inv | null
  focal_gamma: 2.0
  textcnn_filter_sizes: null
  textcnn_num_filters: null
  textcnn_dropout: 0.5
  run_name: null
